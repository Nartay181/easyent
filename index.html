<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>ЕНТ 2027 — Вебинар EasyENT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>


<section class="section hero">
  <div class="wrap">

    <div class="hero__logo">
      <img src="img/block1logo.png" alt="EasyENT">
    </div>

    <h1 class="hero__title">ЕНТ 2027</h1>
    <p class="hero__sub">ВЕБИНАР КАК НАБРАТЬ 130+</p>

    <div class="hero__badge">ДЛЯ 10 КЛАССОВ</div>


    <div class="hero__visual">
      <img src="img/block1certificate.png" alt=""  class="hero__certificate">
      <img src="img/block1clock.png" alt=""  class="hero__clock">
      <img src="img/block1book-top.png"  alt=""  class="hero__bookt">
      <img src="img/block1book-bottom.png" alt=""  class="hero__bookb">
    </div>

    <button class="btn-cta"><span>Участвовать бесплатно</span></button>

  </div>
</section>


<section class="section learn">
  <div class="wrap">

    <h1 class="learn__title">НА ВЕБЕ ТЫ УЗНАЕШЬ</h1>

    <div class="learn__cards">

      <div class="notebook">
        <img src="img/block2notebook.png" alt="Балл на ЕНТ">
      </div>

      <div class="learn-card">
        <img src="img/block2laptop.png" alt="Формат ЕНТ">
      </div>

      <div class="learn-card">
        <img src="img/block2settings.png" alt="Гранты">
      </div>

      <div class="learn-card">
        <img src="img/block2score130.png" alt="130+">
        <img src="img/block2text130.png" alt="130+">
      </div>

    </div>

    <div class="raffle">
      <img src="img/block2draw.png" alt="Розыгрыш">
    </div>

    <button class="btn-cta js-open-modal">УЧАСТВОВАТЬ БЕСПЛАТНО</button>

  </div>
</section>


<section class="section forwho">
  <div class="wrap">

    <h2 class="forwho__title">ЭТОТ ВЕБИНАР ДЛЯ ТЕБЯ, ЕСЛИ ТЫ:</h2>

    <div class="forwho__cards">


      <div class="forwho-card">
        <img src="img/block31.png" alt="">
      </div>

      <div class="forwho-card">
        <img src="img/block32.png" alt="">
      </div>

      <div class="forwho-card">
        <img src="img/block33.png" alt="">
      </div>

      <div class="forwho-card">
        <img src="img/block34.png" alt="">
      </div>

      <div class="forwho-card">
        <img src="img/block35.png" alt="">
      </div>

    </div>

    <button class="btn-cta js-open-modal">УЧАСТВОВАТЬ БЕСПЛАТНО</button>

  </div>
</section>


<div class="modal-overlay" id="modal-overlay">
  <div class="modal">

    <button class="modal__close" id="modal-close">✕</button>

    <h3 class="modal__title">Участвую бесплатно!</h3>
    <p class="modal__subtitle">Оставьте заявку — мы пришлём ссылку на вебинар</p>

    <form class="modal__form" id="lead-form" novalidate>
      <input type="text" name="name"  placeholder="Ваше имя"           required>
      <input type="tel"  name="phone" placeholder="+7 (___) ___-__-__" required>
      <button type="submit" class="btn-cta">ОТПРАВИТЬ ЗАЯВКУ</button>
    </form>

    <p class="modal__success" id="form-success">
      ✅ Заявка принята! Ждите звонка.
    </p>

  </div>
</div>


<script src="script.js"></script>
</body>
</html>
